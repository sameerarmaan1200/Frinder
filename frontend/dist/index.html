<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frinder — Verified Global Friendship Platform</title>
  <meta name="description" content="Discover real, verified friendships from 180+ countries. Pure friendship. No borders. No limits." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #070c18;
      color: #e8f0fe;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a1020; }
    ::-webkit-scrollbar-thumb { background: #0066ff55; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #0066ffaa; }
    #root { min-height: 100vh; }

    /* Global glow effects */
    .blue-glow { box-shadow: 0 0 20px rgba(0,102,255,0.4); }
    .text-glow { text-shadow: 0 0 20px rgba(59,158,255,0.6); }
    .border-glow { border-color: rgba(0,102,255,0.5) !important; box-shadow: 0 0 10px rgba(0,102,255,0.2); }

    /* Glass morphism */
    .glass {
      background: rgba(13, 21, 38, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 102, 255, 0.12);
    }
    .glass-dark {
      background: rgba(7, 12, 24, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 102, 255, 0.08);
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #3b9eff 0%, #0066ff 50%, #004ecc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Animated gradient background */
    .bg-animated {
      background: radial-gradient(ellipse at top left, #001433 0%, #070c18 50%, #000d1f 100%);
    }

    /* Shimmer loading */
    .shimmer {
      background: linear-gradient(90deg, #0d1526 25%, #1a2d4a 50%, #0d1526 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Status dot */
    .online-dot {
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid #070c18;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    /* Notification badge */
    .notif-badge {
      position: absolute; top: -4px; right: -4px;
      background: #ef4444; color: #fff;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #070c18;
    }

    /* Leaflet dark theme override */
    .leaflet-container { background: #0a1020 !important; }
    .leaflet-tile { filter: brightness(0.7) saturate(1.2) hue-rotate(10deg); }
  </style>
  <script type="module" crossorigin src="./assets/index-B4k403_c.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-dzakQndm.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
